<div
  class="cursor-pointer bg-white rounded-2xl shadow-md hover:shadow-xl hover:-translate-y-1 transition overflow-hidden h-[170px]"
  [routerLink]="['/countries', country.code]"
>
  <div class="relative h-20">
    <img [src]="country.flag" class="w-full h-full object-cover" loading="lazy" />

    <div class="absolute top-2 left-2 bg-black/70 text-white text-xs px-2 py-1 rounded-full">
      {{ country.region }}
    </div>
  </div>
  <div class="p-3 text-sm">
    <h3 class="font-semibold text-gray-900 truncate">
      {{ country.name }}
    </h3>
    <p class="text-gray-500 text-xs">Capital: {{ country.capital }}</p>
    <p class="text-gray-500 text-xs">Pop: {{ country.population | number }}</p>
    <p class="text-gray-500 text-xs">Area: {{ country.area | number }} km²</p>
  </div>
</div>
