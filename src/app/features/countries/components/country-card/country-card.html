<div
  class="cursor-pointer bg-white rounded-xl shadow p-4 hover:shadow-lg transition"
  [routerLink]="['/countries', country.code]"
  [queryParams]="{
    search: search,
    region: region,
    page: page,
  }"
>
  <img [src]="country.flag" class="w-full h-40 object-cover rounded" />

  <h3 class="mt-3 font-bold text-lg">{{ country.name }}</h3>
  <p>Capital: {{ country.capital }}</p>
  <p>Population: {{ country.population | number }}</p>
</div>
