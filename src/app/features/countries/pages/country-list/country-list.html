<div class="h-screen flex flex-col">
  <div class="max-w-7xl mx-auto w-full px-6 py-6 flex flex-col flex-1">
    <header class="mb-6">
      <h1 class="text-3xl font-semibold tracking-tight text-white">Country Explorer</h1>
    </header>
    <div class="flex flex-col md:flex-row md:items-center gap-4 mb-6">
      <div class="w-full md:flex-1">
        <input
          type="text"
          [value]="searchTerm()"
          placeholder="Search for a country..."
          class="w-full px-5 py-3 rounded-xl bg-white/95 border border-white/20 shadow-sm focus:ring-2 focus:ring-primaryLight outline-none transition"
          (input)="updateSearch($any($event.target).value)"
        />
      </div>
      <div class="w-full md:w-auto flex justify-center">
        <select
          class="w-full md:w-auto px-5 py-3 rounded-xl bg-white shadow-sm border border-white/20 focus:ring-2 focus:ring-primaryLight outline-none transition cursor-pointer"
          [value]="region()"
          (change)="region.set($any($event.target).value)"
        >
          <option value="">All Regions</option>
          <option value="Africa">Africa</option>
          <option value="Americas">Americas</option>
          <option value="Asia">Asia</option>
          <option value="Europe">Europe</option>
          <option value="Oceania">Oceania</option>
        </select>
      </div>
      <div class="w-full md:w-auto flex justify-center">
        <select
          class="w-full md:w-auto px-5 py-3 rounded-xl bg-white shadow-sm border border-white/20 focus:ring-2 focus:ring-primaryLight outline-none transition cursor-pointer"
          (change)="sortBy.set($any($event.target).value)"
        >
          <option value="name">Sort by Name</option>
          <option value="population">Sort by Population</option>
          <option value="area">Sort by Area</option>
        </select>
      </div>
    </div>
    <div class="flex-1 flex flex-col">
      <h2 class="text-xl font-semibold text-white mb-4">Countries</h2>

      <div
        *ngIf="loading(); else countriesLoaded"
        class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 flex-1 content-start cards-fade"
      >
        <app-country-card
          *ngFor="let country of paginatedCountries(); let i = index"
          class="country-card-animate"
          [style.animationDelay.ms]="i * 80"
          [country]="country"
          [search]="searchTerm()"
          [region]="region()"
          [page]="currentPage()"
        >
        </app-country-card>
      </div>
      <ng-template #countriesLoaded>
        <div
          *ngIf="filteredCountries().length > 0; else noResults"
          class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 flex-1 content-start"
        >
          <app-country-card
            *ngFor="let country of paginatedCountries(); let i = index; trackBy: trackCountry"
            class="country-card-animate"
            [style.animationDelay.ms]="i * 60"
            [country]="country"
            [search]="searchTerm()"
            [region]="region()"
            [page]="currentPage()"
          >
          </app-country-card>
        </div>
      </ng-template>
      <ng-template #loadingSkeleton>
        <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
          <app-skeleton-country-card *ngFor="let item of [].constructor(12)">
          </app-skeleton-country-card>
        </div>
      </ng-template>
      <ng-template #noResults>
        <div class="flex flex-col items-center justify-center flex-1 text-center">
          <p class="text-white text-xl font-semibold">No countries found</p>

          <p class="text-white/70 text-sm mt-2 mb-4">Try adjusting your search or region filter.</p>

          <button
            (click)="clearFilters()"
            class="px-5 py-2 rounded-lg bg-primaryLight text-white hover:bg-primaryDeep hover:cursor-pointer transition"
          >
            Clear Filters
          </button>
        </div>
      </ng-template>
    </div>
    <div *ngIf="filteredCountries().length > 0" class="flex justify-center mt-4 overflow-x-auto">
      <div class="flex items-center gap-2 flex-nowrap">
        <button
          (click)="goToFirstPage()"
          [disabled]="currentPage() === 1"
          class="px-2 py-1 text-xs md:px-3 md:py-2 md:text-sm bg-gray-200 rounded-lg hover:bg-gray-300 disabled:opacity-40 hover:cursor-pointer"
        >
          «
        </button>

        <button
          (click)="prevPage()"
          [disabled]="currentPage() === 1"
          class="px-2 py-1 text-xs md:px-3 md:py-2 md:text-sm bg-gray-200 rounded-lg hover:bg-gray-300 disabled:opacity-40 hover:cursor-pointer"
        >
          ‹
        </button>

        <span class="px-2 text-xs md:text-sm font-medium text-white whitespace-nowrap">
          Page {{ currentPage() }} of {{ totalPages() }}
        </span>

        <button
          (click)="nextPage()"
          [disabled]="currentPage() === totalPages()"
          class="px-2 py-1 text-xs md:px-3 md:py-2 md:text-sm bg-gray-200 rounded-lg hover:bg-gray-300 disabled:opacity-40 hover:cursor-pointer"
        >
          ›
        </button>

        <button
          (click)="goToLastPage()"
          [disabled]="currentPage() === totalPages()"
          class="px-2 py-1 text-xs md:px-3 md:py-2 md:text-sm bg-gray-200 rounded-lg hover:bg-gray-300 disabled:opacity-40 hover:cursor-pointer"
        >
          »
        </button>
      </div>
    </div>
  </div>
</div>
